version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: azmarineberg-postgres
    environment:
      POSTGRES_USER: azmarineberg
      POSTGRES_PASSWORD: azmarineberg_dev
      POSTGRES_DB: azmarineberg_portal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: azmarineberg-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: azmarineberg-minio
    environment:
      MINIO_ROOT_USER: azmarineberg
      MINIO_ROOT_PASSWORD: azmarineberg_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
